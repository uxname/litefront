schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

type Mutation {
  """Adds a job to the test queue"""
  addTestJob(message: String!): Boolean!
  """Echo mutation — returns the input text (dev utility)"""
  echo(text: String!): String!
  """Update the current user profile fields"""
  updateProfile(input: ProfileUpdateInput!): Profile!
}

"""Authenticated user profile linked to an OIDC account"""
type Profile {
  """Avatar image URL"""
  avatarUrl: String
  """Short biography"""
  bio: String
  """Profile creation timestamp"""
  createdAt: DateTime!
  """Public display name"""
  displayName: String
  """Unique profile identifier"""
  id: Int!
  """Assigned roles (ADMIN, USER)"""
  roles: [ProfileRole!]
  """Profile last update timestamp"""
  updatedAt: DateTime!
}

"""User authorization roles"""
enum ProfileRole {
  ADMIN
  USER
}

"""Input fields for updating a user profile"""
input ProfileUpdateInput {
  """New avatar image URL"""
  avatarUrl: String
  """New short biography"""
  bio: String
  """New public display name"""
  displayName: String
}

type Query {
  debug: JSON!
  """Echo back the input text (dev utility)"""
  echo(text: String!): String!
  """Get the currently authenticated profile"""
  me: Profile!
  """Test i18n translation by username"""
  testTranslation(username: String!): String!
}

type Subscription {
  """Receive real-time updates when the current user profile changes"""
  profileUpdated: Profile!
}